name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.js
            *.json
            lib/
            skills/
            docs/
            .gitignore
            FRAMEWORK.md
            SKILL.md
            CLAUDE.md
            release.sh
            .github/
